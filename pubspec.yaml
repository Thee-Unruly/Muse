name: muse
environment:
  sdk: '^3.9.0'
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # recording
  record: ^6.1.1

  # permissions
  permission_handler: ^11.3.1

  # file storage
  path_provider: ^2.1.3

  # speech to text
  speech_to_text: ^6.6.1

  # http client for API calls
  http: ^1.2.1

  # Hive database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.3.3 # Added uuid package

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
